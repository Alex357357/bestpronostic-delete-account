<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supprimer mon compte - BestPronostic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #1E293B;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h1 { color: #FFFFFF; font-size: 28px; margin-bottom: 16px; }
        .warning-box {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #EF4444;
            padding: 16px;
            border-radius: 12px;
            margin: 24px 0;
        }
        .warning-box p { color: #FCA5A5; font-size: 14px; }
        label { display: block; color: #E2E8F0; margin-bottom: 8px; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 16px;
            margin-bottom: 16px;
        }
        input:focus { outline: none; border-color: #EF4444; }
        button {
            width: 100%;
            padding: 14px;
            background: #EF4444;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #DC2626; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            display: none;
        }
        .result.success { background: rgba(34, 197, 94, 0.1); border: 1px solid #22C55E; display: block; }
        .result.success p { color: #22C55E; }
        .result.error { background: rgba(239, 68, 68, 0.1); border: 1px solid #EF4444; display: block; }
        .result.error p { color: #EF4444; }
        .footer { margin-top: 32px; text-align: center; color: #64748B; font-size: 12px; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info-text { color: #94A3B8; font-size: 13px; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Supprimer mon compte</h1>
        
        <div class="warning-box">
            <p>⚠️ Cette action est IRRÉVERSIBLE. Toutes vos données seront définitivement supprimées.</p>
        </div>

        <form id="deleteForm">
            <label>📧 Email du compte à supprimer</label>
            <input type="email" id="email" placeholder="exemple@email.com" required>
            
            <label>🔑 Mot de passe</label>
            <input type="password" id="password" placeholder="Votre mot de passe" required>
            
            <button type="submit" id="deleteBtn">🗑️ Supprimer définitivement mon compte</button>
        </form>

        <div id="result" class="result"></div>
        <div class="info-text">La suppression est immédiate et sans possibilité de retour en arrière.</div>
        
        <div class="footer">
            <p>© 2025 BestPronostic</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // ========== CONFIGURATION FIREBASE (À REMPLACER) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyD3XzKWiy5l0REjPXR4EF07tYzLmitOPL4",  // ← REMPLACER
            authDomain: "bestpronostic-8e327.firebaseapp.com",
            projectId: "bestpronostic-8e327",
            storageBucket: "bestpronostic-8e327.firebasestorage.app",
            messagingSenderId: "586254780424",  // ← REMPLACER
            appId: "1:563584335869:android:com.example.bestpronostic"
        };

        // Initialisation
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const form = document.getElementById('deleteForm');
        const deleteBtn = document.getElementById('deleteBtn');
        const resultDiv = document.getElementById('result');

        function showResult(type, message) {
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = `<p>${message}</p>`;
            setTimeout(() => {
                resultDiv.style.display = 'none';
            }, 8000);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                deleteBtn.disabled = true;
                deleteBtn.innerHTML = '<span class="spinner"></span> Suppression en cours...';
            } else {
                deleteBtn.disabled = false;
                deleteBtn.innerHTML = '🗑️ Supprimer définitivement mon compte';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showResult('error', '❌ Veuillez remplir tous les champs');
                return;
            }

            setLoading(true);

            try {
                // 1. Connexion avec email/mot de passe
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // 2. Suppression du compte
                await user.delete();

                showResult('success', '✅ Votre compte a été supprimé avec succès !');
                
                // Redirection après 3 secondes
                setTimeout(() => {
                    window.location.href = 'https://www.google.com';
                }, 3000);

            } catch (error) {
                let message = '❌ Erreur lors de la suppression';
                
                switch(error.code) {
                    case 'auth/user-not-found':
                        message = '❌ Aucun compte trouvé avec cet email';
                        break;
                    case 'auth/wrong-password':
                        message = '❌ Mot de passe incorrect';
                        break;
                    case 'auth/invalid-email':
                        message = '❌ Email invalide';
                        break;
                    case 'auth/too-many-requests':
                        message = '❌ Trop de tentatives. Réessayez plus tard.';
                        break;
                    default:
                        message = `❌ ${error.message}`;
                }
                
                showResult('error', message);
                
                // Déconnexion en cas d'erreur
                await auth.signOut();
            } finally {
                setLoading(false);
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>
</html>
